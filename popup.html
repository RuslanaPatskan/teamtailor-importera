<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1a1a2e;
    }
    .header {
      background: linear-gradient(135deg, #e84b3c, #c0392b);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo { font-size: 22px; }
    .header-text h2 { color: #fff; font-size: 14px; font-weight: 700; }
    .header-text p  { color: rgba(255,255,255,0.8); font-size: 11px; margin-top: 1px; }
    .body { padding: 16px; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .status-row.ok    { background: #d4edda; color: #155724; }
    .status-row.error { background: #f8d7da; color: #721c24; }
    .status-row.warn  { background: #fff3cd; color: #856404; }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f0f2f5;
      font-size: 12px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: #636e72; }
    .info-row .value { color: #2d3436; font-weight: 600; max-width: 160px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #e84b3c; color: #fff; }
    .btn-secondary { background: #f0f2f5; color: #2d3436; }
    .sources { display: flex; gap: 6px; margin-top: 4px; }
    .source-badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    .source-badge.robota { background: #e8f4fd; color: #2980b9; }
    .source-badge.work   { background: #eafaf1; color: #27ae60; }
    .version-tag { text-align: center; font-size: 10px; color: #b2bec3; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f2f5; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">🎯</div>
  <div class="header-text">
    <h2>Teamtailor Importera</h2>
    <p>Імпорт кандидатів в ATS</p>
  </div>
</div>

<div class="body">
  <div id="status-bar" class="status-row warn">⏳ Перевіряю налаштування...</div>

  <div id="info-block">
    <div class="info-row">
      <span class="label">🏷️ Мій тег</span>
      <span class="value" id="info-tag">—</span>
    </div>
    <div class="info-row">
      <span class="label">💼 Вакансія</span>
      <span class="value" id="info-job">—</span>
    </div>
    <div class="info-row">
      <span class="label">📍 Локація</span>
      <span class="value" id="info-loc">—</span>
    </div>
    <div class="info-row">
      <span class="label">🏢 Відділ</span>
      <span class="value" id="info-dept">—</span>
    </div>
    <div class="info-row">
      <span class="label">👤 Роль</span>
      <span class="value" id="info-role">—</span>
    </div>
    <div class="info-row">
      <span class="label">Платформи</span>
      <div class="sources">
        <span class="source-badge robota">robota.ua</span>
        <span class="source-badge work">work.ua</span>
      </div>
    </div>
  </div>

  <div class="version-tag">v3.9.3</div>

  <button class="btn btn-primary" id="btn-options">⚙️ Налаштування</button>
  <button class="btn btn-secondary" id="btn-help">❓ Як користуватись</button>
</div>

<script src="popup.js"></script>
</body>
</html>
